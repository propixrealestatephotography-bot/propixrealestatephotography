<!-- CONTACT -->

<section id="contact">
  <div class="container">

    <h2>Get In Touch</h2>

    <div class="contact-wrapper">

      <!-- CONTACT FORM -->

      <form action="https://api.web3forms.com/submit" method="POST">

        <!-- Web3Forms Access Key -->
        <input 
          type="hidden" 
          name="access_key" 
          value="5d2cecf4-3430-4261-83aa-bbf9f160b877"
        >

        <!-- Email Subject -->
        <input 
          type="hidden" 
          name="subject" 
          value="New ProPix Website Inquiry"
        >

        <!-- Disable Spam -->
        <input 
          type="checkbox" 
          name="botcheck" 
          class="hidden" 
          style="display:none;"
        >

        <!-- Success Redirect -->
        <input 
          type="hidden" 
          name="redirect" 
          value="https://propixrealestatephotography.com"
        >

        <!-- Name -->
        <input
          type="text"
          name="name"
          placeholder="Your Name"
          required
        >

        <!-- Email -->
        <input
          type="email"
          name="email"
          placeholder="Email Address"
          required
        >

        <!-- Phone -->
        <input
          type="tel"
          name="phone"
          placeholder="Phone Number"
        >

        <!-- Message -->
        <textarea
          name="message"
          placeholder="Tell us about your project"
          rows="6"
          required
        ></textarea>

        <!-- Submit Button -->
        <button type="submit" class="btn">
          Send Message
        </button>

      </form>

      <!-- CONTACT INFO -->

      <div>

        <h3>Contact Information</h3>

        <br>

        <p><strong>Phone:</strong> 0421 792 742</p>

        <p><strong>Email:</strong> propixrealestatephotography@gmail.com</p>

        <p><strong>Instagram:</strong> @propixrealestatephotography1</p>

        <p><strong>Service Area:</strong> Melbourne & Surrounding Areas</p>

      </div>

    </div>

  </div>
</section>
